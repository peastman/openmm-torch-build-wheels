  windows:
    runs-on: ${{ matrix.os }}
    name: "${{ matrix.name }} ${{ matrix.python-version}}"
    strategy:
      matrix:
        python-version: ["3.10"]
        include:
          - name: Windows x86
            os: windows-latest
            requirements: windows
            cuda-version: "12.5.0"
            hip-version: "6"

    steps:
      - uses: actions/checkout@v3

      - uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: build-env
          create-args: >-
            python=${{ matrix.python-version }}
          init-shell: bash cmd.exe powershell

      - name: "Install dependencies with pip"
        shell: cmd /C call {0}
        run: |
          pip install -v --pre -r devtools/requirements/${{ matrix.requirements }}.txt

      - name: "Install dependencies with choco"
        uses: crazy-max/ghaction-chocolatey@v3
        with:
          args:
            install doxygen.install jom

      - name: "Install CUDA"
        uses: Jimver/cuda-toolkit@v0.2.16
        id: cuda-toolkit
        with:
          cuda: ${{matrix.cuda-version}}
          method: 'network'
#          sub-packages: '["nvcc", "nvrtc", "nvrtc_dev", "cufft", "cufft_dev", "opencl", "cudart", "cuda_profiler_api"]'

#      - name: "Install HIP"
#        shell: cmd /C call {0}
#        run: |
#          curl.exe --output HIP.exe --url https://download.amd.com/developer/eula/rocm-hub/AMD-Software-PRO-Edition-24.Q3-Win10-Win11-For-HIP.exe
#          HIP.exe -install

      - name: "Check out OpenMM-Torch source code"
        shell: cmd /C call {0}
        run: |
          git clone https://github.com/openmm/openmm-torch.git
          cd openmm-torch
          git checkout %GIT_REVISION%
          git apply %GITHUB_WORKSPACE%\devtools\patches\extras_require.patch

      - name: "Configure build with CMake"
        shell: cmd /C call {0}
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cd openmm-torch
          mkdir build
          cd build
          for /f "usebackq delims==" %%v in (`python -c "import site; print(site.getsitepackages()[-1])"`) do set SITE_PACKAGES=%%v
          cmake -G "NMake Makefiles JOM" ^
            -DCMAKE_INSTALL_PREFIX=%SITE_PACKAGES%/OpenMM.libs ^
            -DOPENMM_DIR=%SITE_PACKAGES%/OpenMM.libs ^
            -DCMAKE_PREFIX_PATH="%SITE_PACKAGES%/OpenMM.libs" ^
            -DTorch_DIR=%SITE_PACKAGES%/torch/share/cmake/Torch ^
            -DCMAKE_CUDA_ARCHITECTURES=OFF ^
            -DCMAKE_CXX_COMPILER=cl.exe ^
            -DCMAKE_C_COMPILER=cl.exe ^
            -DOPENCL_INCLUDE_DIR="${{steps.cuda-toolkit.outputs.CUDA_PATH}}/include" ^
            -DOPENCL_LIBRARY="${{steps.cuda-toolkit.outputs.CUDA_PATH}}/lib/x64/OpenCL.lib" ^
            ..

      - name: "Build OpenMM-Torch"
        shell: cmd /C call {0}
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cd openmm-torch\build
          jom -j 4 install
          jom -j 4 PythonInstall

      - name: "Build wheel"
        shell: cmd /C call {0}
        run: |
          cd openmm-torch\build\python
          set FULL_CUDA_VERSION=${{ matrix.cuda-version }}
          set CUDA_VERSION=%FULL_CUDA_VERSION:~0,2%
          pip wheel -w dist .
          cd dist
          for /f "usebackq delims==" %%v in (`python -c "import site; print(site.getsitepackages()[-1])"`) do set SITE_PACKAGES=%%v
          python %GITHUB_WORKSPACE%\devtools\scripts\add_plugins_and_headers.py "%SITE_PACKAGES%\OpenMM.libs" "Torch" "!CUDA" "!HIP"

      - name: "Build CUDA wheel"
        shell: cmd /C call {0}
        run: |
          cd %GITHUB_WORKSPACE%\devtools\cuda
          findstr "OPENMM_VERSION:STRING=" %GITHUB_WORKSPACE%\openmm-torch\build\CMakeCache.txt > version.txt
          set /P OPENMM_TORCH_VERSION_LINE= < version.txt
          set OPENMM_TORCH_VERSION=%OPENMM_TORCH_VERSION_LINE:~22%%VERSION_SUFFIX%
          set FULL_CUDA_VERSION=${{ matrix.cuda-version }}
          set CUDA_VERSION=%FULL_CUDA_VERSION:~0,2%
          pip wheel -w dist .
          cd dist
          for /f "usebackq delims==" %%v in (`python -c "import site; print(site.getsitepackages()[-1])"`) do set SITE_PACKAGES=%%v
          python %GITHUB_WORKSPACE%\devtools\scripts\add_plugins_and_headers.py "%SITE_PACKAGES%\OpenMM.libs" "Torch" "CUDA"
          move openmm_torch*.whl %GITHUB_WORKSPACE%\openmm-torch\build\python\dist
#
      - name: "Test the wheel"
        shell: cmd /C call {0}
        run: |
          python -m venv "%USERPROFILE%\test_env"
          cd openmm-torch\build
          set FULL_CUDA_VERSION=${{ matrix.cuda-version }}
          set CUDA_VERSION=%FULL_CUDA_VERSION:~0,2%
          %USERPROFILE%\test_env\Scripts\pip install "numpy"
          %USERPROFILE%\test_env\Scripts\pip install --pre --find-links . openmmtorch[cuda%CUDA_VERSION%]
#          python -c "import openmmtorch; f = openmmtorch.TorchForce('tests/forces.pt')"

      - name: "Upload the wheel"
        uses: actions/upload-artifact@v4
        with:
          name: openmm-torch-wheel-windows-${{matrix.python-version}}
          path: openmm-torch\build\python\dist
          retention-days: 10
